name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v4

      - name: Instalacja Pythona 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety pip-audit

      - name: bandit (statyczna analiza kodu)
        run: bandit -r . -x ./venv,./core/migrations -ll

      - name: safety (skan podatnych zależności)
        run: safety check -r requirements.txt

      - name: pip-audit (dodatkowy skan zależności)
        run: pip-audit -r requirements.txt